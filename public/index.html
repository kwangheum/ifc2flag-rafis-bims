<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IFC Upload to FRAG</title>
    <style>
      :root {
        --bg: #f4efe6;
        --card: rgba(255, 252, 246, 0.92);
        --line: #d4c5af;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #c96f3b;
        --accent-dark: #8f4a24;
        --ok-bg: #eef8f0;
        --ok-line: #9bc9a4;
        --err-bg: #fff0ed;
        --err-line: #efb3a7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Pretendard", "Noto Sans KR", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(201, 111, 59, 0.18), transparent 32%),
          radial-gradient(circle at bottom right, rgba(92, 126, 109, 0.16), transparent 28%),
          linear-gradient(135deg, #f7f2ea, var(--bg));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: min(760px, 100%);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: 0 24px 80px rgba(75, 54, 38, 0.14);
        overflow: hidden;
      }

      .hero {
        padding: 32px 32px 18px;
        border-bottom: 1px solid rgba(212, 197, 175, 0.65);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.2rem);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .lead {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.65;
      }

      .content {
        padding: 28px 32px 32px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.56);
      }

      form {
        display: grid;
        gap: 16px;
      }

      label {
        font-size: 0.92rem;
        font-weight: 700;
      }

      input[type="file"] {
        width: 100%;
        padding: 14px;
        border: 1px dashed #b99a78;
        border-radius: 16px;
        background: #fffdf8;
      }

      button {
        width: fit-content;
        border: 0;
        border-radius: 999px;
        padding: 14px 22px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        color: white;
        font-size: 0.96rem;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      .hint {
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.6;
      }

      .result {
        margin-top: 18px;
        padding: 18px;
        border-radius: 18px;
        border: 1px solid var(--line);
        display: none;
      }

      .result.success {
        display: block;
        background: var(--ok-bg);
        border-color: var(--ok-line);
      }

      .result.error {
        display: block;
        background: var(--err-bg);
        border-color: var(--err-line);
      }

      .result h2 {
        margin: 0 0 10px;
        font-size: 1.08rem;
      }

      .result p {
        margin: 6px 0;
        line-height: 1.55;
      }

      .result a {
        color: var(--accent-dark);
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1>IFC Upload</h1>
        <p class="lead">
          업로드하면 IFC 파일을 자동으로 저장하고 바로 <code>.frag</code>로 변환합니다.
          저장 위치는 <code>uploadFiles/년/월</code>, 변환 결과는
          <code>uploadFiles/년/월/frags</code>입니다.
        </p>
      </section>

      <section class="content">
        <div class="panel">
          <form id="upload-form">
            <div>
              <label for="file">IFC 파일 선택</label>
              <input id="file" name="file" type="file" accept=".ifc" required />
            </div>
            <button id="submit-button" type="submit">업로드하고 변환하기</button>
            <p class="hint">
              샘플 페이지 주소는 <code>/</code>이고 업로드 API는 <code>/api/conversions/upload</code>를 사용합니다.
            </p>
          </form>
          <div id="result" class="result"></div>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("upload-form");
      const resultBox = document.getElementById("result");
      const submitButton = document.getElementById("submit-button");

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function setResult(type, html) {
        resultBox.className = `result ${type}`;
        resultBox.innerHTML = html;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const fileInput = document.getElementById("file");
        const file = fileInput.files?.[0];

        if (!file) {
          setResult("error", "<h2>업로드 실패</h2><p>IFC 파일을 먼저 선택해 주세요.</p>");
          return;
        }

        const formData = new FormData();
        formData.append("file", file);

        submitButton.disabled = true;
        setResult("success", "<h2>처리 중</h2><p>업로드 후 자동 변환하고 있습니다. 잠시만 기다려 주세요.</p>");

        try {
          const response = await fetch("/api/conversions/upload", {
            method: "POST",
            body: formData
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.message || "업로드 중 오류가 발생했습니다.");
          }

          setResult(
            "success",
            `
              <h2>업로드 및 변환 완료</h2>
              <p><strong>원본 파일:</strong> ${escapeHtml(data.sourceRelativePath)}</p>
              <p><strong>FRAG 파일:</strong> ${escapeHtml(data.fragmentRelativePath)}</p>
              <p><strong>변환 ID:</strong> ${escapeHtml(data.conversionId)}</p>
              <p><a href="${escapeHtml(data.downloadUrl)}">변환된 FRAG 다운로드</a></p>
              <p><a href="${escapeHtml(data.uploadUrl)}" target="_blank" rel="noreferrer">저장된 IFC 확인</a></p>
            `
          );
        } catch (error) {
          const message = error instanceof Error ? error.message : "알 수 없는 오류가 발생했습니다.";
          setResult("error", `<h2>업로드 실패</h2><p>${escapeHtml(message)}</p>`);
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
